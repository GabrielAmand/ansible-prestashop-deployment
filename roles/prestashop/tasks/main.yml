---
# tasks file for roles/prestashop
- name: Install Apache, PHP and required extensions
  ansible.builtin.apt:
    name:
      - apache2
      - php
      - php-mysql
      - php-curl
      - php-xml
      - php-zip
      - php-gd
      - unzip
      - wget
    state: present
    update_cache: true

- name: Ensure Apache is started and enabled
  ansible.builtin.service:
    name: apache2
    state: started
    enabled: true


- name: Copy Prestashop archive
  ansible.builtin.copy:
    src: prestashop_edition_basic_version_9.1.0-4.0.zip
    dest: /tmp/prestashop.zip
    mode: '0644'

- name: Unzip Prestashop archive
  ansible.builtin.unarchive:
    src: /tmp/prestashop.zip
    dest: /tmp/
    remote_src: true


- name: Extract Prestashop directly to web root
  ansible.builtin.unarchive:
    src: /tmp/prestashop.zip
    dest: "{{ web_root }}"
    remote_src: true
    owner: www-data
    group: www-data

- name: Set proper permissions
  ansible.builtin.file:
    path: "{{ web_root }}"
    owner: www-data
    group: www-data
    recurse: true

- name: Remove default Apache index.html
  ansible.builtin.file:
    path: "{{ web_root }}/index.html"
    state: absent
  