---
# tasks file for roles/mysql
- name: Install MySQL server and dependencies
  ansible.builtin.apt:
    name:
      - mysql-server
      - python3-pymysql
    state: present
    update_cache: true

- name: Ensure MySQL service is started and enabled
  ansible.builtin.service:
    name: mysql
    state: started
    enabled: true

- name: Configure MySQL bind-address
  ansible.builtin.lineinfile:
    path: /etc/mysql/mysql.conf.d/mysqld.cnf
    regexp: '^bind-address\s*='
    line: "bind-address = {{ mysql_bind_address }}"
    backup: true
  notify: Restart MySQL

- name: Apply MySQL config changes immediately
  ansible.builtin.meta: flush_handlers

- name: Set root password and allow remote root access
  community.mysql.mysql_user:
    name: root
    host: "{{ mysql_root_host }}"
    password: "{{ mysql_root_password }}"
    login_unix_socket: /var/run/mysqld/mysqld.sock
    priv: "*.*:ALL,GRANT"
    state: present

- name: Create Prestashop database
  community.mysql.mysql_db:
    name: "{{ mysql_database }}"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock

- name: Create Prestashop user
  community.mysql.mysql_user:
    name: "{{ mysql_user }}"
    password: "{{ mysql_user_password }}"
    host: "{{ mysql_user_host }}"
    priv: "{{ mysql_database }}.*:ALL"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock