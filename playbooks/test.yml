---
- name: Validate MySQL server
  hosts: db
  become: true

  tasks:
    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Check MySQL service is active
      ansible.builtin.assert:
        that:
          - "'mysql.service' in ansible_facts.services"
          - ansible_facts.services['mysql.service'].state == 'running'
        fail_msg: "MySQL service is not running."
        success_msg: "MySQL service is running."

    - name: Check MySQL port 3306 is listening
      ansible.builtin.wait_for:
        port: 3306
        timeout: 5

    - name: Check Prestashop database exists
      ansible.builtin.command: >
        mysql --socket=/var/run/mysqld/mysqld.sock -N -B -e "SHOW DATABASES LIKE 'prestashop';"
      register: prestashop_db_check
      changed_when: false

    - name: Show Prestashop database check result
      ansible.builtin.debug:
        var: prestashop_db_check.stdout

    - name: Assert Prestashop database exists
      ansible.builtin.assert:
        that:
          - prestashop_db_check.stdout == "prestashop"
        fail_msg: "Prestashop database was not found."
        success_msg: "Prestashop database exists."

- name: Validate Prestashop web server
  hosts: web
  become: true

  tasks:
    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Check Apache service is active
      ansible.builtin.assert:
        that:
          - "'apache2.service' in ansible_facts.services"
          - ansible_facts.services['apache2.service'].state == 'running'
        fail_msg: "Apache service is not running."
        success_msg: "Apache service is running."

    - name: Check HTTP port 80 is listening
      ansible.builtin.wait_for:
        port: 80
        timeout: 5

    - name: Check Prestashop installer responds
      ansible.builtin.uri:
        url: http://localhost/install
        status_code:
          - 200
          - 301
          - 302
          - 404
      register: prestashop_install_response

    - name: Show HTTP response status
      ansible.builtin.debug:
        var: prestashop_install_response.status

    - name: Check Prestashop files are present
      ansible.builtin.stat:
        path: /var/www/html/index.php
      register: prestashop_index

    - name: Assert Prestashop index.php exists
      ansible.builtin.assert:
        that:
          - prestashop_index.stat.exists
        fail_msg: "Prestashop index.php was not found in /var/www/html."
        success_msg: "Prestashop files are present."
